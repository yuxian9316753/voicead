<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時 EQ 頻率偵測助手</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1c1c1e;
            color: #f2f2f7;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h2 { color: #0a84ff; }
        canvas {
            background-color: #2c2c2e;
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            height: 250px;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #info-panel { margin-top: 20px; }
        #freq-display { font-size: 1.5em; font-weight: bold; margin-bottom: 10px; color: #ff9f0a; }
        #advice-box {
            background-color: #3a3a3c;
            padding: 20px;
            border-radius: 12px;
            font-size: 1.1em;
            line-height: 1.5;
            min-height: 60px;
        }
        button {
            background-color: #0a84ff;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.2em;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }
        button:active { background-color: #007aff; }
    </style>
</head>
<body>

    <h2>人聲 EQ 頻率偵測</h2>
    <button id="startBtn">啟動分析儀</button>
    
    <canvas id="visualizer"></canvas>
    
    <div id="info-panel">
        <div id="freq-display">目前主要頻率: -- Hz</div>
        <div id="advice-box">請允許麥克風權限並開始發聲...</div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const canvas = document.getElementById('visualizer');
        const canvasCtx = canvas.getContext('2d');
        const freqDisplay = document.getElementById('freq-display');
        const adviceBox = document.getElementById('advice-box');

        let audioContext;
        let analyser;
        let dataArray;
        let animationId;

        // 解決高解析度螢幕 Canvas 模糊問題
        canvas.width = canvas.clientWidth * window.devicePixelRatio;
        canvas.height = canvas.clientHeight * window.devicePixelRatio;

        startBtn.addEventListener('click', async () => {
            // iOS Safari 需要在使用者互動時初始化或恢復 AudioContext
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }

            try {
                // 取得麥克風權限
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(stream);
                
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048; // 解析度，越高越精準，但運算量越大
                source.connect(analyser);
                
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);

                startBtn.style.display = 'none'; // 隱藏啟動按鈕
                draw(); // 開始繪製與分析
                
            } catch (err) {
                console.error('麥克風存取失敗:', err);
                adviceBox.innerText = '錯誤：無法存取麥克風。請確保網頁使用 HTTPS 並允許麥克風權限。';
            }
        });

        function draw() {
            animationId = requestAnimationFrame(draw);
            analyser.getByteFrequencyData(dataArray);

            // --- 視覺化 (繪製頻譜圖) ---
            canvasCtx.fillStyle = 'rgb(44, 44, 46)';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

            const barWidth = (canvas.width / dataArray.length) * 2.5;
            let barHeight;
            let x = 0;
            let maxEnergy = 0;
            let dominantIndex = 0;

            for (let i = 0; i < dataArray.length; i++) {
                barHeight = dataArray[i];

                // 尋找能量最強的頻段
                if (barHeight > maxEnergy) {
                    maxEnergy = barHeight;
                    dominantIndex = i;
                }

                // 畫長條圖 (漸層色)
                canvasCtx.fillStyle = `rgb(${barHeight + 100}, 100, 255)`;
                canvasCtx.fillRect(x, canvas.height - barHeight * 2, barWidth, barHeight * 2);
                x += barWidth + 1;
            }

            // --- 計算主要頻率並給出建議 ---
            // 只有當音量大於一定程度時才進行分析，避免背景底噪干擾
            if (maxEnergy > 50) { 
                const sampleRate = audioContext.sampleRate;
                const nyquist = sampleRate / 2;
                // 將陣列索引轉換為實際頻率 (Hz)
                const dominantFrequency = Math.round((dominantIndex / dataArray.length) * nyquist);
                
                freqDisplay.innerText = `目前主要頻率: ${dominantFrequency} Hz`;
                adviceBox.innerText = getEQAdvice(dominantFrequency);
            }
        }

        // 智慧建議邏輯引擎
        function getEQAdvice(freq) {
            if (freq >= 20 && freq < 80) return "⚠️ 偵測到極低頻噪音：\n建議開啟 HPF (Low Cut) 切除 80Hz 以下頻段，減少麥克風低頻震動或風切聲。";
            if (freq >= 80 && freq < 250) return "ℹ️ 基礎厚實區能量強：\n若人聲聽起來太「轟」(Boomy)，建議在此頻段稍微衰減 2-3 dB。";
            if (freq >= 250 && freq < 500) return "⚠️ 渾濁區 (Muddy) 突出：\n容易產生「盒音」(Boxy)。建議在 300-400Hz 附近進行衰減 (Cut)，讓聲音乾淨。";
            if (freq >= 500 && freq < 1500) return "ℹ️ 鼻音區警告：\n若聽感帶有塑膠味或像捏著鼻子唱歌，嘗試在 1kHz 附近掃頻並適度拉低。";
            if (freq >= 1500 && freq < 5000) return "✅ 核心清晰區：\n此為人耳敏感區。若整體聽起來不夠亮，提升 3k-4kHz 可增加咬字穿透力。";
            if (freq >= 5000 && freq < 8000) return "⚠️ 唇齒音 (Sibilance) 偏高：\n偵測到尖銳的「S」嘶聲。建議使用 De-esser 或針對 6k-7kHz 進行衰減。";
            if (freq >= 8000) return "✨ 高頻空氣感：\n這部分能增加聲音的通透度與高貴感，通常不需要大量調整。";
            return "正在監聽中...";
        }
    </script>
</body>
</html>
